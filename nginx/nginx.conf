user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ────────────────────────────────────────────────────────────
    # 클라이언트(선박) 식별 로그 포맷
    #   $http_x_forwarded_for : HAProxy 가 주입한 실제 선박 IP
    #   $remote_addr           : HAProxy 컨테이너 IP (직접 연결 시 선박 IP)
    # ────────────────────────────────────────────────────────────
    log_format  ship_trace
        '$time_iso8601 '
        'client=$http_x_forwarded_for '   # 선박 실제 IP (HAProxy X-Forwarded-For)
        'proxy=$remote_addr '             # HAProxy IP
        'method=$request_method '
        'uri=$request_uri '
        'status=$status '
        'bytes=$body_bytes_sent '
        'rt=$request_time '
        'auth="$http_authorization"';     # Bearer session_id 확인용 (필요 시 제거)

    access_log  /var/log/nginx/access.log  ship_trace;

    sendfile        on;
    keepalive_timeout  65;

    # ── HAProxy 가 주입하는 X-Forwarded-For 를 신뢰할 upstream 범위 ──
    # HAProxy 컨테이너가 Docker bridge 내부에서 접근하므로 내부 대역만 허용
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    include /etc/nginx/conf.d/*.conf;
}
