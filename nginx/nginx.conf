user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log info;   # info: TLS 핸드셰이크 실패 포함 / 운영 시 warn으로 복귀
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ────────────────────────────────────────────────────────────
    # 클라이언트(선박) 식별 로그 포맷
    #   $http_x_forwarded_for : HAProxy 가 주입한 실제 선박 IP
    #   $remote_addr           : HAProxy 컨테이너 IP (직접 연결 시 선박 IP)
    # ────────────────────────────────────────────────────────────
    log_format  ship_trace
        '$time_iso8601 '
        'client=$http_x_forwarded_for '   # 선박 실제 IP (HAProxy X-Forwarded-For)
        'proxy=$remote_addr '             # HAProxy IP
        'method=$request_method '
        'uri=$request_uri '
        'status=$status '
        'bytes=$body_bytes_sent '
        'rt=$request_time '
        'auth="$http_authorization" '     # Bearer session_id 확인용 (필요 시 제거)
        # ── TLS 핸드셰이크 정보 ─────────────────────────────
        # ssl_protocol       : 협상된 TLS 버전 (TLSv1.2 / TLSv1.3)
        # ssl_cipher         : 협상된 암호화 스위트
        # ssl_session_reused : 세션 재사용 여부 (r=재사용, .=풀 핸드셰이크)
        # ssl_client_verify  : mTLS 클라이언트 인증 결과 (SUCCESS/FAILED/NONE)
        'tls_proto=$ssl_protocol '
        'tls_cipher=$ssl_cipher '
        'tls_resumed=$ssl_session_reused '
        'mtls=$ssl_client_verify';

    access_log  /var/log/nginx/access.log  ship_trace;

    sendfile        on;
    keepalive_timeout  1800;   # 30분 — server 블록(30m)과 일치, 65s이면 30분 전에 연결 끊김

    # ── HAProxy 가 주입하는 X-Forwarded-For 를 신뢰할 upstream 범위 ──
    # HAProxy 컨테이너가 Docker bridge 내부에서 접근하므로 내부 대역만 허용
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    include /etc/nginx/conf.d/*.conf;
}
