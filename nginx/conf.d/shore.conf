# ── Upstream: 외부 restAPI 서버 ────────────────────────────
# API_HOST / API_PORT 는 entrypoint.sh 에서 envsubst 로 치환됨
upstream api_server {
    server 192.168.50.4:28080;
    keepalive 16;
}

# ────────────────────────────────────────────────────────────
# REST API + WebSocket  (선박 HAProxy 192.168.50.241:28080 → 해안 Nginx 192.168.50.9:29090 → restAPI 192.168.50.9:5000)
#   WebSocket 경로 : /ws
#   REST 경로      : /api/test, /api/login
# ────────────────────────────────────────────────────────────
server {
    listen 29090 ssl;
    server_name _;

    # ── TLS 설정 ───────────────────────────────────────────
    # Nginx 자신의 인증서 (HAProxy가 검증할 것)
    ssl_certificate        /etc/nginx/certs/server.crt;
    ssl_certificate_key    /etc/nginx/certs/server.key;

    # mTLS: HAProxy(클라이언트) 인증서 검증
    ssl_client_certificate /etc/nginx/certs/ca.crt;
    ssl_verify_client      on;

    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_ciphers            HIGH:!aNULL:!MD5;
    ssl_session_cache      shared:SSL:10m;
    ssl_session_timeout    10m;

    # ── REST API ───────────────────────────────────────────
    location = /api/test {
        proxy_pass         http://api_server;
        proxy_http_version 1.1;                    # HTTP/1.1 → Connection: keep-alive 유지
        proxy_set_header   Connection "";           # keep-alive 강제 (close 방지)
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Ship-ID        $http_x_forwarded_for;
    }

    location /api/subscriptions {
        proxy_pass         http://api_server;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Ship-ID        $http_x_forwarded_for;
    }

    location = /api/login {
        limit_except POST { deny all; }
        proxy_pass         http://api_server;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Ship-ID        $http_x_forwarded_for;
    }

    location = /api/register {
        limit_except POST { deny all; }
        proxy_pass         http://api_server;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Ship-ID        $http_x_forwarded_for;
    }

    location = /api/certificate {
        limit_except POST { deny all; }
        proxy_pass         http://api_server;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Ship-ID        $http_x_forwarded_for;
    }
    

    # ── WebSocket ──────────────────────────────────────────
    location /ws {
        proxy_pass              http://api_server;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade          $http_upgrade;
        proxy_set_header        Connection       "upgrade";
        proxy_set_header        Host             $host;
        proxy_set_header        X-Real-IP        $remote_addr;
        proxy_set_header        X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header        X-Ship-ID        $http_x_forwarded_for;
        proxy_set_header        Authorization    $http_authorization;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    location / {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }
}

# ────────────────────────────────────────────────────────────
# Nginx Status (내부 모니터링 전용)
# ────────────────────────────────────────────────────────────
server {
    listen 29091;
    server_name _;

    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # allow 192.168.0.0/16;
    # deny  all;

    location /nginx_status {
        stub_status;
    }
}


