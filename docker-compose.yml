version: "3.9"

services:
  # ── Reverse Proxy (해안국 측) — Nginx 단독 ─────────────────
  # restAPI 서버는 별도 환경에서 실행 중 → API_HOST:API_PORT 로 포워딩
  reverse-proxy:
    build: .
    container_name: reverse-proxy
    network_mode: host          # 외부 restAPI 서버에 직접 라우팅하기 위해 host 모드 사용
                                # (bridge 모드 시 외부 IP 접근에 extra_hosts 필요)
    environment:
      API_HOST: "192.168.50.4"  # restAPI 서버 IP
      API_PORT: "28080"         # restAPI 서버 포트
      CA_URL: "http://192.168.50.25:8080/api/admin/proxy-cert"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./logs/nginx:/var/log/nginx
      - ./nginx/certs:/etc/nginx/certs:rw  # mTLS 인증서 (shore.key, ca.crt → server.crt 자동 발급)
    entrypoint: ["/entrypoint.sh"]
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "5"
